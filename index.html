function flashScoreChanges(){try{const prev=JSON.parse(localStorage.getItem('wcScores')||'{}');const now={};document.querySelectorAll('.match').forEach(el=>{const id=el.dataset.id,key=el.dataset.scorekey;now[id]=key;if(prev[id]&&prev[id]!==key){el.querySelectorAll('.score').forEach(s=>s.classList.add('goalFlash'));el.classList.add('winnerFlash');}});localStorage.setItem('wcScores',JSON.stringify(now));}catch(e){}}
function highlightTeam(q){q=(q||'').trim().toLowerCase();document.querySelectorAll('.match').forEach(el=>el.classList.remove('highlightPath'));if(!q)return;document.querySelectorAll('.match').forEach(el=>{if((el.dataset.teams||'').includes(q))el.classList.add('highlightPath')});}
function toggleToday(){todayOnly=!todayOnly;const today=new Date().toDateString();document.querySelectorAll('.match').forEach(el=>{el.classList.remove('todayDim','todayFocus');if(!todayOnly)return;const d=el.dataset.date?new Date(el.dataset.date):null;if(d&&d.toDateString()===today)el.classList.add('todayFocus');else el.classList.add('todayDim');});}
function updateMiniMap(){miniMap.style.display=zoom>0.55?'block':'none';if(zoom<=0.55)return;const sx=miniMap.clientWidth/(bracket.scrollWidth*zoom);const sy=miniMap.clientHeight/(bracket.scrollHeight*zoom);miniViewport.style.left=(wrap.scrollLeft*sx)+'px';miniViewport.style.top=(wrap.scrollTop*sy)+'px';miniViewport.style.width=Math.max(20,wrap.clientWidth*sx)+'px';miniViewport.style.height=Math.max(14,wrap.clientHeight*sy)+'px';}
wrap.addEventListener('scroll',updateMiniMap,{passive:true});

updateAlertButton();loadLive();setInterval(loadLive,60000);setTimeout(()=>{fitToScreen();setTimeout(centerLive,350)},300);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
