function derivedMatch(id,a,b,roundDate){const dt=formatSchedule(roundDate);return {id,teams:[{name:a,score:'',winner:false},{name:b,score:'',winner:false}],date:dt,rawDate:roundDate,venue:'',status:'pre',detail:a==='TBD'||b==='TBD'?'Waiting on prior round':(countdown(roundDate)||'Not started'),live:false}}
function teamRow(t,complete){const cls=complete?(t.winner?'winner':'loser'):'';return `<div class="team ${cls}"><div onclick="showTeam('${t.name.replace(/'/g,"\\'")}')" class="name"><span class="flag">${flags[t.name]||''}</span><span>${t.name}</span></div><div class="score">${t.score??''}</div></div>`}
function getMinute(detail){let m=(detail||'').match(/(\d{1,3})['’]/);return m?Math.min(120,parseInt(m[1],10)):0}
function liveLabel(m){const min=getMinute(m.detail);return `<span class="liveBadge"><span class="liveDot"></span>LIVE${min?` ${min}'`:''}</span>`}
function progressPct(m){const min=getMinute(m.detail);return min?Math.max(1,Math.min(100,Math.round(min/90*100))):10}
function card(m,label){let done=m.status==='post',live=m.status==='in';let statusHtml=done?'FT':live?liveLabel(m):(label||m.detail);let progress=live?`<div class="progressWrap"><div class="progressBar" style="width:${progressPct(m)}%"></div></div>`:'';let scoreKey=m.teams.map(t=>`${t.name}:${t.score}`).join('|');return `<div class="match clickable ${live?'live':''}" data-id="${m.id}" data-teams="${m.teams.map(t=>t.name.toLowerCase()).join(' ')}" data-date="${m.rawDate||''}" data-scorekey="${scoreKey}" onclick="showMatch('${m.id}')"><div class="meta"><span>${m.date}</span><span class="${done?'completed':live?'liveText':'scheduled'}">${statusHtml}</span></div>${progress}<div class="teams">${teamRow(m.teams[0],done)}${teamRow(m.teams[1],done)}</div><div class="venue"><span>${m.venue||' '}</span><span>${m.detail||''}</span></div></div>`}
function buildMatches(){let r32=r32Pairs.map((p,i)=>blankMatch('r32_'+i,p,staticDates[i]));let r16=[];for(let i=0;i<16;i+=2)r16.push(derivedMatch('r16_'+i/2,winnerOf(r32[i]),winnerOf(r32[i+1]),r16Dates[i/2]));let qf=[];for(let i=0;i<8;i+=2)qf.push(derivedMatch('qf_'+i/2,winnerOf(r16[i]),winnerOf(r16[i+1]),qfDates[i/2]));let sf=[];for(let i=0;i<4;i+=2)sf.push(derivedMatch('sf_'+i/2,winnerOf(qf[i]),winnerOf(qf[i+1]),sfDates[i/2]));let final=derivedMatch('final',winnerOf(sf[0]),winnerOf(sf[1]),finalDate);return {r32,r16,qf,sf,final}}
let current={};function render(){current=buildMatches();let {r32,r16,qf,sf,final}=current;let html=`<div class="col"><h2>ROUND OF 32</h2><div class="roundDates">Jun 28 – Jul 3</div>${r32.slice(0,8).map((m,i)=>`<div class="slot r32a${i}">${card(m)}</div>`).join('')}</div><div class="col"><h2>ROUND OF 16</h2><div class="roundDates">Winners advance</div>${r16.slice(0,4).map((m,i)=>`<div class="slot r16a${i}">${card(m)}</div>`).join('')}</div><div class="col"><h2>QUARTERFINALS</h2><div class="roundDates">Winners advance</div>${qf.slice(0,2).map((m,i)=>`<div class="slot qfa${i}">${card(m)}</div>`).join('')}</div><div class="col"><h2>SEMIFINALS</h2><div class="roundDates">Winners advance</div><div class="slot sfa0">${card(sf[0])}</div></div><div class="center"><div class="logo"><div class="trophy">🏆</div>FIFA<br>WORLD CUP</div><div class="finalSlot">${card(final,'FINAL')}</div></div><div class="col"><h2>SEMIFINALS</h2><div class="roundDates">Winners advance</div><div class="slot sfb0">${card(sf[1])}</div></div><div class="col"><h2>QUARTERFINALS</h2><div class="roundDates">Winners advance</div>${qf.slice(2,4).map((m,i)=>`<div class="slot qfb${i}">${card(m)}</div>`).join('')}</div><div class="col"><h2>ROUND OF 16</h2><div class="roundDates">Winners advance</div>${r16.slice(4,8).map((m,i)=>`<div class="slot r16b${i}">${card(m)}</div>`).join('')}</div><div class="col"><h2>ROUND OF 32</h2><div class="roundDates">Jun 29 – Jul 3</div>${r32.slice(8,16).map((m,i)=>`<div class="slot r32b${i}">${card(m)}</div>`).join('')}</div>`;
bracket.innerHTML=html;renderUpcoming();applyZoom();postRenderEnhancements();}
function renderUpcoming(){/* Upcoming list removed per user request. */}
function allMatches(){return [...(current.r32||[]),...(current.r16||[]),...(current.qf||[]),...(current.sf||[]),current.final].filter(Boolean)}
function showMatch(id){const m=allMatches().find(x=>x.id===id);if(!m)return;drawerContent.innerHTML=`<h3>${flags[m.teams[0].name]||''} ${m.teams[0].name} vs ${flags[m.teams[1].name]||''} ${m.teams[1].name}</h3><div class="tabs"><span class="tab active">Overview</span><span class="tab">Score</span><span class="tab">Path</span></div><p><b>Date:</b> ${m.date}<br><b>Status:</b> ${m.detail}<br><b>Venue:</b> ${m.venue||'TBD'}<br><b>Score:</b> ${m.teams[0].score||'-'} - ${m.teams[1].score||'-'}<br><br><b>Live details:</b> goal scorers, cards, shots, possession, corners, and attendance can be added here when the source provides those stats.</p>`;drawer.classList.add('show')}
function calculateGroupFallback(group){
  const fixed=fixedStandingsTable(group);
  if(fixed) return fixed;
  const teams=groupData[group]||[];
  const table={};
  teams.forEach(t=>{table[teamKey(t)]={team:t,played:0,wins:0,draws:0,losses:0,gf:0,ga:0,gd:0,points:0};});
  liveEvents.forEach(e=>{
    if(e.status==='pre' || !e.teams || e.teams.length<2) return;
    const a=e.teams[0], b=e.teams[1];
    const ak=teamKey(a.name), bk=teamKey(b.name);
    if(!table[ak] || !table[bk]) return;
    const as=Number(a.score), bs=Number(b.score);
    if(Number.isNaN(as) || Number.isNaN(bs)) return;
    table[ak].played++; table[bk].played++;
    table[ak].gf+=as; table[ak].ga+=bs;
    table[bk].gf+=bs; table[bk].ga+=as;
    if(as>bs){table[ak].wins++; table[bk].losses++; table[ak].points+=3;}
    else if(bs>as){table[bk].wins++; table[ak].losses++; table[bk].points+=3;}
    else {table[ak].draws++; table[bk].draws++; table[ak].points++; table[bk].points++;}
  });
  Object.values(table).forEach(r=>r.gd=r.gf-r.ga);
  return table;
}
function groupStandingsRows(group,selected){
  const sourceTeams=(fixedStandings[group]||[]).map(r=>r[0]);
  const teams=sourceTeams.length?sourceTeams:(groupData[group]||[]);
  const fallback=calculateGroupFallback(group);
  const rows=teams.map((t,i)=>{
    const live=(standingsByGroup[group]||{})[teamKey(t)]||{};
    const fb=fallback[teamKey(t)]||{};
    return {
      team:t,
      rank:fifaRanks[t]||'',
      played:live.played??live.gamesPlayed??live.gp??fb.played??0,
      wins:live.wins??live.w??fb.wins??0,
      draws:live.draws??live.d??fb.draws??0,
      losses:live.losses??live.l??fb.losses??0,
      gf:live.gf??live.goalsFor??fb.gf??0,
      ga:live.ga??live.goalsAgainst??fb.ga??0,
      gd:live.gd??live.goalDifference??fb.gd??0,
      points:live.points??live.pts??fb.points??0,
      original:i
    };
  }).sort((a,b)=> b.points-a.points || b.gd-a.gd || b.gf-a.gf || a.original-b.original);
  return rows.map((r,i)=>{
    const sel=teamKey(r.team)===teamKey(selected)?' selectedTeamRow':'';
    return `<tr class="${sel}"><td>${i+1}</td><td class="teamCell">${flags[r.team]||''} ${r.team}</td><td>${r.rank}</td><td>${r.played}</td><td>${r.wins}</td><td>${r.draws}</td><td>${r.losses}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gd}</td><td>${r.points}</td></tr>`;
  }).join('');
}
function groupScoresHtml(group){
  const teams=(groupData[group]||[]).map(teamKey);
  const evs=liveEvents.filter(e=>{
    const names=e.teams.map(t=>teamKey(t.name));
    return names.length>=2 && teams.includes(names[0]) && teams.includes(names[1]);
  });
  if(!evs.length) return `<div class="smallNote">Group-stage scores are not available from the current live feed yet. When the source provides those games, they will appear here automatically.</div>`;
  return `<div class="scoreList">${evs.map(e=>{
    const a=e.teams[0]||{}, b=e.teams[1]||{};
    const showScore=e.status!=='pre';
    return `<div class="scoreItem"><div class="dateLine">${formatDate(e.date,e.date)} • ${e.detail||''}</div><div class="scoreLine">${flags[a.name]||''} ${a.name} ${showScore?a.score:''} - ${showScore?b.score:''} ${flags[b.name]||''} ${b.name}</div></div>`;
  }).join('')}</div>`;
}
function showTeam(name){
  const group=getGroupForTeam(name);
  const groupBlock=group?`<div class="groupTitle">Group ${group}</div><table class="groupTable"><thead><tr><th>Place</th><th>Team</th><th>FIFA Rank</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>${groupStandingsRows(group,name)}</tbody></table>`:`<div class="smallNote">Group information is not available for this slot yet.</div>`;
  drawerContent.innerHTML=`<div class="bigflag">${flags[name]||'🏆'}</div><h3>${name}</h3>${groupBlock}`;
  drawer.classList.add('show');
  event?.stopPropagation?.();
}
function applyZoom(){stage.style.transform=`scale(${zoom})`;stage.style.width=(bracket.scrollWidth*zoom+20)+'px';stage.style.height=(bracket.scrollHeight*zoom+20)+'px';zoomLabel.textContent=Math.round(zoom*100)+'%'; if(typeof updateMiniMap==='function') updateMiniMap();}function zoomIn(){zoom=Math.min(1.8,zoom+.1);applyZoom()}function zoomOut(){zoom=Math.max(.25,zoom-.1);applyZoom()}function resetZoom(){zoom=1;applyZoom()}function fitToScreen(){const headerH=document.querySelector('header').offsetHeight||0;const zx=(wrap.clientWidth-6)/bracket.scrollWidth;const zy=(window.innerHeight-headerH-8)/bracket.scrollHeight;zoom=Math.max(.18,Math.min(1,zx,zy));applyZoom();wrap.scrollLeft=0;wrap.scrollTop=0;}window.addEventListener('resize',()=>{if(zoom<1)fitToScreen()});
function toggleTheme(){document.body.classList.toggle('light')}async function shareBracket(){if(navigator.share){await navigator.share({title:document.title,text:'Live World Cup bracket',url:location.href}).catch(()=>{})}else alert('Copy this file/link and share it.')}function exportPNG(){alert('Use your browser screenshot feature, or Print/PDF. A no-library PNG export is not reliable on all phones.')} 

// Finger pinch-to-zoom for phones/tablets
let pinchStartDist=0, pinchStartZoom=1, pinchContentX=0, pinchContentY=0;
function pinchDistance(touches){
  const dx=touches[0].clientX-touches[1].clientX;
  const dy=touches[0].clientY-touches[1].clientY;
  return Math.hypot(dx,dy);
}
function pinchMidpoint(touches){return {x:(touches[0].clientX+touches[1].clientX)/2,y:(touches[0].clientY+touches[1].clientY)/2};}
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    pinchStartDist=pinchDistance(e.touches);
    pinchStartZoom=zoom;
    const mid=pinchMidpoint(e.touches);
    const rect=wrap.getBoundingClientRect();
    pinchContentX=(wrap.scrollLeft + mid.x - rect.left)/zoom;
    pinchContentY=(wrap.scrollTop + mid.y - rect.top)/zoom;
    isPanning=false;
  }
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2 && pinchStartDist){
    e.preventDefault();
    const newDist=pinchDistance(e.touches);
    const newZoom=Math.max(.25,Math.min(2.2,pinchStartZoom*(newDist/pinchStartDist)));
    const mid=pinchMidpoint(e.touches);
    const rect=wrap.getBoundingClientRect();
    zoom=newZoom;
    applyZoom();
    // Keep the bracket point between your fingers in the same place while zooming.
    wrap.scrollLeft=pinchContentX*zoom-(mid.x-rect.left);
    wrap.scrollTop=pinchContentY*zoom-(mid.y-rect.top);
  }
},{passive:false});
wrap.addEventListener('touchend',e=>{
  if(e.touches.length<2) pinchStartDist=0;
  if(e.touches.length===0) isPanning=false;
},{passive:false});

// One-finger drag/pan for phones/tablets
let isPanning=false, panStartX=0, panStartY=0, panStartLeft=0, panStartTop=0;
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    isPanning=true;
    panStartX=e.touches[0].clientX;
    panStartY=e.touches[0].clientY;
    panStartLeft=wrap.scrollLeft;
    panStartTop=wrap.scrollTop;
  }
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===1 && isPanning){
    e.preventDefault();
    const dx=e.touches[0].clientX-panStartX;
    const dy=e.touches[0].clientY-panStartY;
    wrap.scrollLeft=panStartLeft-dx;
    wrap.scrollTop=panStartTop-dy;
  }
},{passive:false});


let todayOnly=false;
function postRenderEnhancements(){updateFloatingLive();updateMiniMap();flashScoreChanges();}
function liveCards(){return [...document.querySelectorAll('.match.live')]}
function updateFloatingLive(){const n=liveCards().length;floatingLive.style.display=n?'block':'none';floatingLive.textContent=`🔴 Live (${n})`;}
function centerLive(){const el=liveCards()[0];if(!el)return;const r=el.getBoundingClientRect(), wr=wrap.getBoundingClientRect();wrap.scrollLeft += (r.left+r.width/2)-(wr.left+wr.width/2);wrap.scrollTop += (r.top+r.height/2)-(wr.top+wr.height/2);}
function flashScoreChanges(){try{const prev=JSON.parse(localStorage.getItem('wcScores')||'{}');const now={};document.querySelectorAll('.match').forEach(el=>{const id=el.dataset.id,key=el.dataset.scorekey;now[id]=key;if(prev[id]&&prev[id]!==key){el.querySelectorAll('.score').forEach(s=>s.classList.add('goalFlash'));el.classList.add('winnerFlash');}});localStorage.setItem('wcScores',JSON.stringify(now));}catch(e){}}
function highlightTeam(q){q=(q||'').trim().toLowerCase();document.querySelectorAll('.match').forEach(el=>el.classList.remove('highlightPath'));if(!q)return;document.querySelectorAll('.match').forEach(el=>{if((el.dataset.teams||'').includes(q))el.classList.add('highlightPath')});}
function toggleToday(){todayOnly=!todayOnly;const today=new Date().toDateString();document.querySelectorAll('.match').forEach(el=>{el.classList.remove('todayDim','todayFocus');if(!todayOnly)return;const d=el.dataset.date?new Date(el.dataset.date):null;if(d&&d.toDateString()===today)el.classList.add('todayFocus');else el.classList.add('todayDim');});}
function updateMiniMap(){miniMap.style.display=zoom>0.55?'block':'none';if(zoom<=0.55)return;const sx=miniMap.clientWidth/(bracket.scrollWidth*zoom);const sy=miniMap.clientHeight/(bracket.scrollHeight*zoom);miniViewport.style.left=(wrap.scrollLeft*sx)+'px';miniViewport.style.top=(wrap.scrollTop*sy)+'px';miniViewport.style.width=Math.max(20,wrap.clientWidth*sx)+'px';miniViewport.style.height=Math.max(14,wrap.clientHeight*sy)+'px';}
wrap.addEventListener('scroll',updateMiniMap,{passive:true});

loadLive();setInterval(loadLive,60000);setTimeout(()=>{fitToScreen();setTimeout(centerLive,350)},300);
